data:
  index.html: "<!DOCTYPE html>\r\n<html lang=\"en\">\r\n<head>\r\n  <meta charset=\"UTF-8\">\r\n
    \ <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\r\n
    \ <title>StreamOps Platform</title>\r\n  <style>\r\n    *{box-sizing:border-box;margin:0;padding:0}\r\n
    \   body{font-family:Arial,sans-serif;background:#070b16;color:#fff;min-height:100vh}\r\n
    \   nav{display:flex;justify-content:space-between;align-items:center;padding:22px
    7%;background:#0b1020;position:sticky;top:0}\r\n    .logo{font-size:26px;font-weight:800;color:#38bdf8}\r\n
    \   nav a{color:#cbd5e1;text-decoration:none;margin-left:22px}\r\n    .hero{padding:90px
    7%;background:linear-gradient(120deg,#111827,#172554,#0c4a6e)}\r\n    .hero span{color:#38bdf8;font-weight:bold}\r\n
    \   h1{font-size:54px;max-width:750px;margin:15px 0}\r\n    .hero p{font-size:19px;color:#cbd5e1;max-width:650px;line-height:1.7}\r\n
    \   .button{display:inline-block;margin-top:25px;padding:13px 23px;border-radius:8px;background:#0284c7;color:#fff;text-decoration:none;font-weight:bold}\r\n
    \   section{padding:50px 7%}\r\n    h2{margin-bottom:22px}\r\n    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px}\r\n
    \   .card{min-height:210px;border-radius:16px;padding:25px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0
    10px 30px #0007;transition:.3s}\r\n    .card:hover{transform:translateY(-7px)}\r\n
    \   .one{background:linear-gradient(145deg,#7c3aed,#1e1b4b)}\r\n    .two{background:linear-gradient(145deg,#0284c7,#082f49)}\r\n
    \   .three{background:linear-gradient(145deg,#dc2626,#450a0a)}\r\n    .four{background:linear-gradient(145deg,#059669,#022c22)}\r\n
    \   .tag{font-size:12px;font-weight:bold;color:#bae6fd;margin-bottom:8px}\r\n
    \   .card h3{font-size:23px;margin-bottom:8px}\r\n    .card p{color:#dbeafe;line-height:1.5}\r\n
    \   .status{margin-top:45px;padding:22px;border:1px solid #1e3a5f;background:#0b1220;border-radius:14px}\r\n
    \   .green{color:#4ade80;font-weight:bold}\r\n    footer{text-align:center;padding:35px;color:#94a3b8}\r\n
    \   @media(max-width:600px){h1{font-size:36px}nav .links{display:none}}\r\n  </style>\r\n</head>\r\n<body>\r\n
    \ <nav><div class=\"logo\">StreamOps</div><div class=\"links\"><a href=\"#shows\">Browse</a><a
    href=\"#platform\">Platform</a><a href=\"https://github.com/Arjun99git/my-first-pipeline\">GitHub</a></div></nav>\r\n
    \ <header class=\"hero\">\r\n    <span>SECURE CLOUD-NATIVE STREAMING DEMO</span>\r\n
    \   <h1>Entertainment delivered through DevSecOps automation.</h1>\r\n    <p>A
    streaming-platform demonstration built with Docker, GitHub Actions, GitLab CI/CD,
    security scanning, GHCR, Kubernetes, Helm and autoscaling.</p>\r\n    <a class=\"button\"
    href=\"#shows\">Explore Content</a>\r\n  </header>\r\n  <section id=\"shows\">\r\n
    \   <h2>Featured Content</h2>\r\n    <div class=\"grid\">\r\n      <article class=\"card
    one\"><div class=\"tag\">DEVOPS SERIES</div><h3>Pipeline Masters</h3><p>Build,
    test, secure and deploy cloud-native applications.</p></article>\r\n      <article
    class=\"card two\"><div class=\"tag\">KUBERNETES</div><h3>Cluster Chronicles</h3><p>Scaling
    workloads with Helm, probes and HPA.</p></article>\r\n      <article class=\"card
    three\"><div class=\"tag\">SECURITY</div><h3>Zero-Day Defense</h3><p>Semgrep,
    Trivy and OWASP ZAP protect every release.</p></article>\r\n      <article class=\"card
    four\"><div class=\"tag\">CLOUD NATIVE</div><h3>Container World</h3><p>Immutable
    images published securely through GHCR.</p></article>\r\n    </div>\r\n    <div
    class=\"status\" id=\"platform\"><span class=\"green\">ΓùÅ PLATFORM HEALTHY</span><p>Two
    Kubernetes replicas, readiness and liveness probes, Helm release management and
    CPU-based autoscaling are enabled.</p></div>\r\n  </section>\r\n  <footer>StreamOps
    Platform | My First CI/CD Docker Project | Built by Arjun</footer>\r\n</body>\r\n</html>\r\n"
kind: ConfigMap
