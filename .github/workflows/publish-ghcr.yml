name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arjun99git/my-first-pipeline

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/arjun99git/my-first-pipeline:sha-${{ github.sha }}
            ghcr.io/arjun99git/my-first-pipeline:main
          labels: |
            org.opencontainers.image.source=https://github.com/Arjun99git/my-first-pipeline
            org.opencontainers.image.description=Secure DevSecOps Docker pipeline
          sbom: true
          provenance: mode=max