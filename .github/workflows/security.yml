name: SAST and DAST Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        run: semgrep scan --config auto .

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t security-web:${{ github.sha }} .

      - name: Run website
        run: |
          docker run -d \
            --name security-web \
            -p 8080:80 \
            security-web:${{ github.sha }}

      - name: Wait for website
        run: |
          for i in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080 > /dev/null; then
              echo "Website is ready"
              exit 0
            fi

            sleep 2
          done

          docker logs security-web
          exit 1

      - name: Prepare ZAP report folder
        run: |
          mkdir -p zap-report
          chmod 777 zap-report

      - name: Run OWASP ZAP DAST scan
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/zap-report:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8080 \
            -r zap-report.html \
            -J zap-report.json \
            -I

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-report
          path: zap-report/
          retention-days: 7

      - name: Stop website
        if: always()
        run: docker rm -f security-web || true
