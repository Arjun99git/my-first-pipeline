stages:
  - sast
  - filesystem_scan
  - build
  - image_scan
  - dynamic_scan

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""

semgrep_sast:
  stage: sast
  image:
    name: "semgrep/semgrep:latest"
    entrypoint: [""]
  script:
    - semgrep scan --config auto --json --output semgrep-report.json . || true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: "7 days"

trivy_filesystem:
  stage: filesystem_scan
  image:
    name: "aquasec/trivy:latest"
    entrypoint: [""]
  script:
    - trivy fs --format json --output trivy-filesystem-report.json . || true
  artifacts:
    when: always
    paths:
      - trivy-filesystem-report.json
    expire_in: "7 days"

docker_build:
  stage: build
  image: "docker:24.0.5-cli"
  services:
    - "docker:24.0.5-dind"
  script:
    - docker info
    - docker build -t "my-first-pipeline:${CI_COMMIT_SHA}" .
    - docker save "my-first-pipeline:${CI_COMMIT_SHA}" -o image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: "7 days"

trivy_image:
  stage: image_scan
  image:
    name: "aquasec/trivy:latest"
    entrypoint: [""]
  dependencies:
    - docker_build
  script:
    - trivy image --input image.tar --format json --output trivy-image-report.json || true
  artifacts:
    when: always
    paths:
      - trivy-image-report.json
    expire_in: "7 days"

owasp_zap_dast:
  stage: dynamic_scan
  image: "docker:24.0.5-cli"
  services:
    - "docker:24.0.5-dind"
  dependencies:
    - docker_build
  script:
    - docker load -i image.tar
    - docker network create security-net
    - docker run -d --name app --network security-net "my-first-pipeline:${CI_COMMIT_SHA}"
    - sleep 10
    - |
      docker run --name zap --network security-net \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py \
        -t http://app:80 \
        -I \
        -r zap-report.html || true
    - mkdir -p zap-report
    - docker cp zap:/zap/wrk/zap-report.html zap-report/zap-report.html || true
  after_script:
    - docker rm -f zap app 2>/dev/null || true
    - docker network rm security-net 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - zap-report/
    expire_in: "7 days"
