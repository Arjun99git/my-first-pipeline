apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-pipeline
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: my-first-pipeline
  template:
    metadata:
      labels:
        app: my-first-pipeline
    spec:
      containers:
        - name: website
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

          volumeMounts:
            - name: website-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true

      volumes:
        - name: website-content
          configMap:
            name: website-html

---
apiVersion: v1
kind: Service
metadata:
  name: my-first-pipeline
spec:
  type: NodePort
  selector:
    app: my-first-pipeline
  ports:
    - name: http
      port: 80
      targetPort: http
